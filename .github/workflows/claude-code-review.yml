name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality** — clean code, error handling, readability
            2. **Security** — vulnerabilities, input validation, auth logic
            3. **Performance** — bottlenecks, inefficient queries, resource leaks
            4. **Testing** — coverage gaps, missing edge cases
            5. **Consistency** — adherence to existing project conventions (check CLAUDE.md)

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations.
            Be concise — only flag real issues, not style nitpicks.

          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
