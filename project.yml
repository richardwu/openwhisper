name: OpenWhisper
options:
  bundleIdPrefix: com.openwhisper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper.git
    branch: fast
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.8.1"

targets:
  OpenWhisper:
    type: application
    platform: macOS
    sources:
      - path: OpenWhisper
        excludes:
          - Info.plist
          - Resources/Models
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openwhisper.OpenWhisper
        PRODUCT_NAME: OpenWhisper
        MARKETING_VERSION: "0.4.0"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.openwhisper.OpenWhisper.dev
          PRODUCT_NAME: "OpenWhisper (Dev)"
          PRODUCT_MODULE_NAME: OpenWhisper
    dependencies:
      - package: SwiftWhisper
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: OpenWhisper/Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleIconFile: AppIcon
        LSUIElement: false
        NSMicrophoneUsageDescription: "OpenWhisper needs microphone access to record your voice for transcription."
        NSHumanReadableCopyright: "Copyright © 2025 OpenWhisper. All rights reserved."
        SUFeedURL: "https://raw.githubusercontent.com/richardwu/openwhisper/main/appcast.xml"
        SUPublicEDKey: "CUC/EvtFODphrKHiu20NsqOscAsLuQmyDmlK13BZVnY="
        SUEnableAutomaticChecks: true
    entitlements:
      path: OpenWhisper/OpenWhisper.entitlements
      properties:
        com.apple.security.device.audio-input: true

  OpenWhisperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/OpenWhisperTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenWhisper (Dev).app/Contents/MacOS/OpenWhisper (Dev)"
    dependencies:
      - target: OpenWhisper

  OpenWhisperTranscriptionTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/OpenWhisperTranscriptionTests
      - path: Tests/Fixtures
        buildPhase: resources
        type: folder
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenWhisper (Dev).app/Contents/MacOS/OpenWhisper (Dev)"
    dependencies:
      - target: OpenWhisper

  OpenWhisperUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/OpenWhisperUITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: OpenWhisper
    dependencies:
      - target: OpenWhisper

schemes:
  OpenWhisper:
    build:
      targets:
        OpenWhisper: all
        OpenWhisperTests: [test]
        OpenWhisperTranscriptionTests: [test]
        OpenWhisperUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenWhisperTests
        - OpenWhisperTranscriptionTests
        - OpenWhisperUITests
